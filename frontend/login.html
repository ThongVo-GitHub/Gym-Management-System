<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twelvefit - Login Premium</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        :root {
            --tf-red: #dc2626; /* Màu đỏ Twelvefit chuẩn */
        }
        body { 
            background-color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        
        /* Typography đồng bộ Dashboard */
        .fw-black { font-weight: 900; }
        .tracking-widest { letter-spacing: 0.1em; }
        
        /* Card Login phong cách Apple Glassmorphism */
        .login-card {
            background: #ffffff;
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 480px;
            border: 1px solid #f0f0f0;
        }

        .tf-input {
            background-color: #f5f5f7;
            border: none;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .tf-input:focus {
            background-color: #ededf0;
            outline: 2px solid rgba(220, 38, 38, 0.2);
        }

        .btn-login {
            background-color: var(--tf-red) !important;
            color: white !important;
            border-radius: 15px !important;
            padding: 14px !important;
            font-weight: 700 !important;
            box-shadow: 0 10px 20px rgba(220, 38, 38, 0.2) !important;
            border: none !important;
        }

        /* Tái tạo Logo quả tạ chuẩn từ ảnh của bạn */
        .logo-box {
            background-color: var(--tf-red);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { motion } = window.Motion;

        function App() {
            const handleLogin = (e) => {
                e.preventDefault();
                // Chuyển hướng về file dashboard của bạn
                window.location.href = 'index.html'; 
            };

            return (
                <div className="min-h-screen d-flex flex-column justify-content-between">
                    <main className="container flex-grow-1 d-flex align-items-center py-5">
                        <div className="row w-100 align-items-center">
                            
                            {/* BÊN TRÁI: LOGO & SLOGAN THEO YÊU CẦU */}
                            <motion.div 
                                initial={{ opacity: 0, x: -30 }}
                                animate={{ opacity: 1, x: 0 }}
                                transition={{ duration: 0.8 }}
                                className="col-lg-7 pe-lg-5 text-center text-lg-start"
                            >
                                <div className="d-flex align-items-center gap-3 mb-5 justify-content-center justify-content-lg-start">
                                    <div className="logo-box">
                                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="m6.5 6.5 11 11"/><path d="m21 21-1.5-1.5"/><path d="m3 3 1.5 1.5"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/>
                                        </svg>
                                    </div>
                                    <span className="h3 mb-0 fw-black tracking-widest text-uppercase">
                                        Twelve<span className="text-danger">fit</span>
                                    </span>
                                </div>
                                
                                <h1 className="display-3 fw-black text-uppercase tracking-tighter slogan-text" style={{lineHeight: '1.1'}}>
                                    Thay đổi cơ thể <br />
                                    Thay đổi cuộc sống <br />
                                    Khám phá ngay, <span className="text-danger whitespace-nowrap">TwelveFit</span>
                                </h1>
                                
                                <div className="mt-4 bg-danger mx-auto mx-lg-0" style={{height: '5px', width: '80px', borderRadius: '10px'}}></div>
                            </motion.div>

                            {/* BÊN PHẢI: FORM ĐĂNG NHẬP */}
                            <motion.div 
                                initial={{ opacity: 0, y: 30 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 0.6, delay: 0.2 }}
                                className="col-lg-5 d-flex justify-content-center mt-5 mt-lg-0"
                            >
                                <div className="login-card">
                                    <h2 className="h4 fw-black text-center mb-5 text-uppercase tracking-wider">Đăng nhập thành viên</h2>
                                    
                                    <form onSubmit={handleLogin} className="d-flex flex-column gap-4">
                                        <input type="text" placeholder="Email hoặc ID thành viên" className="tf-input" required />
                                        <input type="password" placeholder="Mật khẩu" className="tf-input" required />
                                        
                                        <div className="text-end">
                                            <a href="#" className="small text-secondary text-decoration-none hover:text-danger">Quên mật khẩu?</a>
                                        </div>

                                        <button type="submit" className="btn-login w-full d-flex align-items-center justify-content-center gap-2">
                                            ĐĂNG NHẬP
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                                        </button>
                                    </form>

                                    <div className="d-flex align-items-center my-5">
                                        <div className="flex-grow-1 border-t border-gray-100"></div>
                                        <span className="px-3 text-[10px] fw-bold text-gray-300 uppercase tracking-widest">Hoặc</span>
                                        <div className="flex-grow-1 border-t border-gray-100"></div>
                                    </div>

                                    <button className="btn btn-dark w-100 py-3 rounded-xl fw-bold text-uppercase tracking-wider shadow-sm">
                                        Tạo tài khoản mới
                                    </button>

                                    <p className="text-center text-[9px] text-gray-400 mt-5 uppercase tracking-[0.2em] fw-bold">
                                        © 2026 TWELVEFIT • PREMIUM GYM SYSTEM
                                    </p>
                                </div>
                            </motion.div>
                        </div>
                    </main>

                    {/* FOOTER LIÊN HỆ */}
                    <footer className="py-4 border-t border-gray-50 bg-gray-50/50">
                        <div className="container text-center">
                            <span className="small font-semibold text-secondary tracking-wider">
                                Liên hệ hỗ trợ: <span className="text-dark">twelvefit12@gmail.com</span>
                            </span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
