# ===== DATABASE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/gym_management
spring.datasource.username=postgres
spring.datasource.password=123456

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== SWAGGER =====
# Bật tính năng tự động sinh API
springdoc.api-docs.enabled=true
# Đường dẫn để truy cập giao diện web Swagger
springdoc.swagger-ui.path=/api-docs-ui.html

# ===== JWT =====
jwt.secret=super-secret-key-123456789
jwt.expiration=86400000

# ===== SERVER =====
server.port=8081
spring.jpa.open-in-view=false

# ================= VNPay Config =================
# Thay 2 dòng dưới bằng mã bạn lấy từ VNPay Sandbox
payment.vnPay.tmnCode=YOUR_TMN_CODE_HERE
payment.vnPay.secretKey=YOUR_HASH_SECRET_HERE

# Các cấu hình mặc định (Đã đồng bộ với VNPAYConfig.java)
payment.vnPay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
payment.vnPay.returnUrl=http://localhost:8081/api/payment/vn-pay-callback
payment.vnPay.version=2.1.0
payment.vnPay.command=pay
payment.vnPay.orderType=other